server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    #access_log  /var/log/nginx/host.access.log  main;

    proxy_read_timeout 600;
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    send_timeout 600;

    client_max_body_size 100M;

    location /msc-viewer/api/openai/ {
        rewrite ^/msc-viewer/api/openai/(.*)$ /v1/$1 break;

        # Proxy to the OpenAI API
        proxy_pass https://api.openai.com/v1/;

        # Pass through common headers
        proxy_set_header Host api.openai.com;
        proxy_set_header Connection "";

        # Add your OpenAI API key from environment
        proxy_set_header Authorization "Bearer ${OPENAI_KEY}";

        # Handle HTTPS
        proxy_ssl_server_name on;

        # Optional: Forward client headers
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow larger request bodies (for long prompts or file uploads)
        client_max_body_size 50M;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_http_version 1.1;

        # Optional: add CORS headers if called from browser
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers Authorization,Content-Type;
        add_header Access-Control-Allow-Methods GET,POST,OPTIONS;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }


    location /msc-viewer/api/anthropic/ {
        rewrite ^/msc-viewer/api/anthropic/(.*)$ /v1/$1 break;

        # Proxy to the OpenAI API
        proxy_pass https://api.anthropic.com/v1/;

        # Pass through common headers
        proxy_set_header Host api.anthropic.com;
        proxy_set_header Connection "";

        # Add your OpenAI API key from environment
        proxy_set_header "x-api-key" "${ANTHROPIC_KEY}";
        proxy_set_header "anthropic-dangerous-direct-browser-access" "true";

        # Handle HTTPS
        proxy_ssl_server_name on;

        # Optional: Forward client headers
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow larger request bodies (for long prompts or file uploads)
        client_max_body_size 50M;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_http_version 1.1;

        # Optional: add CORS headers if called from browser
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers Authorization,Content-Type;
        add_header Access-Control-Allow-Methods GET,POST,OPTIONS;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /msc-viewer/api/bedrock/ {
        rewrite ^/msc-viewer/api/bedrock/(.*)$ /$1 break;

        # Proxy to the OpenAI API
        proxy_pass https://bedrock-runtime.${AWS_REGION}.amazonaws.com/;

        # Pass through common headers
        proxy_set_header Host bedrock-runtime.${AWS_REGION}.amazonaws.com;
        proxy_set_header Connection "";

        proxy_set_header Authorization "Bearer ${AWS_BEDROCK_KEY}";

        proxy_ssl_server_name on;

        # Optional: Forward client headers
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow larger request bodies (for long prompts or file uploads)
        client_max_body_size 50M;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_http_version 1.1;

        # Optional: add CORS headers if called from browser
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers Authorization,Content-Type;
        add_header Access-Control-Allow-Methods GET,POST,OPTIONS;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /msc-viewer/api {
        #rewrite ^/msc-viewer/(.*)$ $1 last;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://msc-backend:8080/api;
    }


    location /msc-viewer {
        #root   /srv/www/htdocs/;
        root /usr/share/nginx/html/;
        index index.html;
        try_files $uri /msc-viewer/index.html;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        #return 301 $scheme://$http_host/msc-viewer;
    }

    #error_page  404              /404.html;
    # redirect server error pages to the static page /50x.html
    #
    # error_page 500 502 503 504 /50x.html;
    # location = /50x.html {
    #     root /usr/share/nginx/html;
    # }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
